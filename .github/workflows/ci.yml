name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:integration
      - run: npm audit
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  container:
    name: Docker build and health smoke
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build --tag txline-sentinel:ci .
      - name: Start replay container
        run: >-
          docker run --detach
          --name txline-sentinel-smoke
          --publish 127.0.0.1:3310:3000
          --env SENTINEL_MODE=replay
          --env TELEGRAM_ENABLED=false
          --env LOG_LEVEL=silent
          --health-interval=1s
          --health-start-period=1s
          --health-timeout=3s
          --health-retries=10
          txline-sentinel:ci
      - name: Verify container health and API
        run: |
          for attempt in {1..30}; do
            status="$(docker inspect --format '{{.State.Health.Status}}' txline-sentinel-smoke)"
            if [ "$status" = "healthy" ]; then
              curl --fail --silent --show-error http://127.0.0.1:3310/health
              curl --fail --silent --show-error \
                --dump-header /tmp/txline-ready.headers \
                --output /tmp/txline-ready.json \
                http://127.0.0.1:3310/ready
              jq --exit-status '.status == "ready" and .ready == true' /tmp/txline-ready.json
              if grep --ignore-case --quiet '^set-cookie:' /tmp/txline-ready.headers; then
                echo '/ready unexpectedly allocated a replay session cookie' >&2
                exit 1
              fi
              curl --fail --silent --show-error http://127.0.0.1:3310/api/live/status |
                jq --exit-status '
                  .enabled == false and
                  .connected == false and
                  .authenticated == false and
                  .connectionStatus == "disabled" and
                  .verification.status == "unavailable"
                '
              curl --fail --silent --show-error http://127.0.0.1:3310/docs/json |
                jq --exit-status '.paths["/api/live/status"].get.responses["200"]'
              curl --fail --silent --show-error http://127.0.0.1:3310/api/agent/status |
                jq --exit-status '.mode == "replay" and .disclaimer == "SIMULATION ONLY — NO REAL MONEY"'
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              break
            fi
            sleep 1
          done
          docker inspect txline-sentinel-smoke
          docker logs txline-sentinel-smoke
          exit 1
      - name: Stop smoke container
        if: always()
        run: docker rm --force txline-sentinel-smoke || true

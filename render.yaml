services:
  - type: web
    name: txline-sentinel
    runtime: docker
    plan: free
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    envVars:
      - key: SENTINEL_MODE
        value: replay
      - key: TXLINE_NETWORK
        value: devnet
      - key: TXLINE_API_ORIGIN
        value: https://txline-dev.txodds.com
      - key: TXLINE_GUEST_JWT
        sync: false
      - key: TXLINE_API_TOKEN
        sync: false
      - key: TXLINE_LIVE_ENABLED
        value: "false"
      - key: TELEGRAM_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: NODE_ENV
        value: production
